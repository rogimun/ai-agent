version: '3.8'

networks:
  mcp-network:
    driver: bridge

services:
  # 데이터 벡터화
  ingest-agent:
    build:
      context: .
      dockerfile: ./agent/Dockerfile
    container_name: ingest-agente
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./db:/app/db
    profiles: ["tools"]

  # MCP 서버 설정
  mcp-server:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/mcp"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mcp-network      
    build:
      context: . 
      dockerfile: ./mcp_server/Dockerfile 
    container_name: mcp-server       
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"

  # 메인 AI 앱 설정
  ai-app:
    networks:
      - mcp-network  
    build:
      context: .
      dockerfile: ./web/Dockerfile 
    container_name: ai-app      
    restart: always

    # 외부에서 8001번 포트로 접속 허용
    # MCP가 뜰 때까지 기다림
    depends_on:
      mcp-server:
        condition: service_healthy 

    env_file:
      - .env
    ports:
      - "8001:8001"

      
