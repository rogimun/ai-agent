version: '3.8'

services:
  # 메인 AI 앱 설정
  ai-app:
    build:
      context: .
      dockerfile: Dockerfile 
    ports:
      - "8000:8000"           # 외부에서 8000번 포트로 접속 허용
    restart: always

  # MCP 서버 설정
  mcp-server:
    build:
      context: ./mcp_server   
      dockerfile: Dockerfile  
    restart: always