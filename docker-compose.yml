version: '3.8'

services:
  # 데이터 벡터화
  ingest-agent:
    build:
      context: .
      dockerfile: ./agent/Dockerfile
    container_name: ingest-agente
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./db:/app/db
    profiles: ["tools"]

  # MCP 서버 설정
  mcp-server:
    build:
      context: . 
      dockerfile: ./mcp_server/Dockerfile 
    container_name: mcp-server       
    restart: always
    env_file:
      - .env
    expose:
      - "8000"     

  # nginx 프록시
  nginx-proxy:
      image: nginx:alpine
      container_name: nginx-proxy
      restart: always
      volumes:
        - ./nginx.conf:/etc/nginx/nginx.conf:ro
      depends_on:
        - mcp-server
      ports:
      - "80:80"        

  # 메인 AI 앱 설정
  ai-app:
    build:
      context: .
      dockerfile: ./web/Dockerfile 
    container_name: ai-app      
    restart: always

    # 외부에서 8001번 포트로 접속 허용
    # MCP가 뜰 때까지 기다림
    depends_on:
      - mcp-server

    env_file:
      - .env
    ports:
      - "8001:8001"

      
