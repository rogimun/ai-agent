events {
    # 한 번에 처리할 수 있는 최대 연결 수
    worker_connections 1024;
}

http {
    # 기본 보안 설정: Nginx 버전 정보를 숨깁니다.
    server_tokens off;

    server {
        listen 80;
        # 도메인이 없으므로 localhost로 설정
        server_name localhost;

        # 로그 설정 (문제가 생기면 docker logs nginx-proxy로 확인 가능)
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        location /mcp/ {
            proxy_pass http://mcp-server:8000/;
            
            proxy_http_version 1.1;
            proxy_set_header Connection ""; # Keep-alive를 위해 비워둠
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # SSE 필수 설정
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            tcp_nopush on;
            tcp_nodelay on;

            # AI 작업 특성상 연결 유지 시간 극대화
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}