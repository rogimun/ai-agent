events {
    # 한 번에 처리할 수 있는 최대 연결 수
    worker_connections 1024;
}

http {
    # 기본 보안 설정: Nginx 버전 정보를 숨깁니다.
    server_tokens off;

    server {
        listen 80;
        # 도메인이 없으므로 localhost로 설정
        server_name localhost;

        # 로그 설정 (문제가 생기면 docker logs nginx-proxy로 확인 가능)
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        location / {
            # 대상 서버 지정 (docker-compose의 mcp-server 서비스 이름 사용)
            proxy_pass http://mcp-server:8000;
            proxy_set_header Host $host; 
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 실제 접속자의 IP 정보를 전달
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # AI 서비스 필수 설정: 타임아웃 연장
            # 답변 생성이나 웹 스크래핑이 길어져도 연결을 유지합니다.
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_connect_timeout 600s;

            # 웹소켓 및 스트리밍 지원 (FastMCP 필수 설정)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 실시간 응답을 위한 버퍼링 비활성화
            # AI가 한 글자씩 출력하는 것을 즉시 볼 수 있게 합니다.
            proxy_buffering off;
        }
    }
}