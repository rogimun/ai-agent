events {
    # 한 번에 처리할 수 있는 최대 연결 수
    worker_connections 1024;
}

http {
    # 기본 보안 설정: Nginx 버전 정보를 숨깁니다.
    server_tokens off;

    server {
        listen 80;
        # 도메인이 없으므로 localhost로 설정
        server_name localhost;

        # 로그 설정
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        location /mcp/ {
            proxy_pass http://mcp-server:8000/;
            proxy_http_version 1.1;
            proxy_set_header Connection ""; # SSE는 Keep-Alive를 위해 비워야 합니다.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 2. 실시간 통신의 핵심: 버퍼링 절대 금지
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;

            # 3. AI 작업은 시간이 걸리므로 타임아웃을 늘립니다.
            proxy_read_timeout 3600s;
        }
    }
}