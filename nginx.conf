events {
    worker_connections 1024;
}

http {
    upstream ai_app {
        server ai-app:8001;
    }

    upstream mcp {
        server mcp-server:8000;
        keepalive 32;
    }

    server_tokens off;

    server {
        listen 80;
        # 도메인이 없으므로 localhost로 설정
        server_name localhost;

        # 로그 설정
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        location /mcp {
            proxy_pass http://mcp;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 실시간 통신의 핵심: 버퍼링 절대 금지
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade"; # WebSocket/SSE 대응
            proxy_buffering off;
            proxy_cache off;

            # AI 작업은 시간이 걸리므로 타임아웃을 늘립니다.
            proxy_read_timeout 86400s; # 실시간 세션 유지용
            proxy_send_timeout 86400s;
        }

        location /api/ {

            proxy_pass http://ai_app;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
        }

        location / {

            proxy_pass http://ai_app;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
        }                
    }
}