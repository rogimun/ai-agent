events {
    # 한 번에 처리할 수 있는 최대 연결 수
    worker_connections 1024;
}

http {
    # 기본 보안 설정: Nginx 버전 정보를 숨깁니다.
    server_tokens off;

    # 업스트림 설정 (추후 서버가 늘어날 경우 대비)
    upstream mcp_servers {
        server mcp-server:8000;
    }

    server {
        listen 80;
        # 도메인
        server_name localhost;

        # 로그 설정
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        location / {
            # 대상 서버 지정
            proxy_pass http://mcp_servers;

            proxy_set_header Host localhost;

            # 실제 접속자의 IP 정보를 전달 (백엔드 로그 기록용)
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # AI 서비스 필수 설정: 타임아웃 연장
            # 스크래핑이나 AI 처리가 길어질 때 연결이 끊기지 않게 합니다.
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_connect_timeout 600s;

            # 웹소켓 및 스트리밍 지원 (FastMCP의 스트리밍 기능을 위해 필요)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}